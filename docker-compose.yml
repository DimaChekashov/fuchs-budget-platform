version: "3.9"

services:
  postgres-identity:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fuchs
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data

  postgres-wallet:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fuchs
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: wallet_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data

  postgres-ledger:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fuchs
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ledger_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_ledger_data:/var/lib/postgresql/data

  postgres-exchange:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fuchs
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: exchange_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_exchange_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_identity_data:
  postgres_wallet_data:
  postgres_ledger_data:
  postgres_exchange_data: